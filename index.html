<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSF Brand Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--d:#002A30;--t:#0D6976;--m:#91DFDA;--lm:#DEF6F4;--st:#CCD4D6;--f:'Poppins',Arial,sans-serif}
body{font-family:var(--f);background:var(--lm);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--d);height:52px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nlogo{display:flex;align-items:center;gap:10px}
.nbsflogo{height:30px;width:auto;mix-blend-mode:screen;display:block}
.ndiv{width:1px;height:16px;background:rgba(255,255,255,.22);flex-shrink:0}
.ntitle{color:rgba(255,255,255,.72);font-size:13px;font-weight:400;letter-spacing:.03em}
.page{flex:1;display:flex}
.left{width:268px;flex-shrink:0;background:#fff;border-right:1px solid var(--st);padding:22px 18px;display:flex;flex-direction:column;gap:22px;overflow-y:auto}
.lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t);margin-bottom:8px}
input[type=file]{display:none}
.drop{border:1.5px dashed var(--st);border-radius:10px;padding:24px 14px;text-align:center;cursor:pointer;transition:.15s;background:#fafafa;position:relative}
.drop:hover,.drop.over{border-color:var(--t);background:var(--lm)}
.drop.filled{padding:0;border-style:solid;border-color:var(--st);overflow:hidden;cursor:default}
.drop.filled img{width:100%;max-height:155px;object-fit:contain;display:block;background:#f0f0f0}
.dico{font-size:22px;color:var(--t);margin-bottom:5px}
.dtx{font-size:12px;color:#888}
.dhi{font-size:10px;color:#bbb;margin-top:3px}
.chgbtn{position:absolute;top:6px;right:6px;background:rgba(0,42,48,.8);color:#fff;border:none;border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:var(--f);z-index:2}
/* checks */
.chks{display:flex;flex-direction:column;gap:5px}
.chk{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--st);border-radius:7px;cursor:pointer;user-select:none;transition:.1s}
.chk.on{border-color:var(--t);background:var(--lm)}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--st);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.1s}
.chk.on .dot{background:var(--t);border-color:var(--t)}
.di2{width:5px;height:5px;border-radius:50%;background:#fff;display:none}
.chk.on .di2{display:block}
.cl{font-size:12px;color:var(--d)}
.go{width:100%;padding:12px;background:var(--d);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:var(--f);cursor:pointer;transition:opacity .15s}
.go:hover:not(:disabled){opacity:.85}
.go:disabled{opacity:.3;cursor:not-allowed}
/* right panel */
.right{flex:1;padding:30px 34px;overflow-y:auto;display:flex;flex-direction:column}
.cmsg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center}
.cmsg .ico{font-size:38px;opacity:.25;color:var(--t)}
.cmsg h2{font-size:15px;font-weight:400;color:#999}
.cmsg p{font-size:12px;color:#bbb;max-width:240px;line-height:1.6}
.loadwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{width:36px;height:36px;border:3px solid var(--st);border-top-color:var(--t);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.lsteps{display:flex;flex-direction:column;gap:6px;align-items:flex-start;margin-top:4px}
.lstep{display:flex;align-items:center;gap:7px;font-size:12px;color:#bbb;transition:.3s}
.lstep.done{color:var(--t)}.lstep.active{color:var(--d);font-weight:500}
.lstep-dot{width:7px;height:7px;border-radius:50%;background:var(--st);flex-shrink:0;transition:.3s}
.lstep.done .lstep-dot{background:var(--t)}.lstep.active .lstep-dot{background:var(--d)}
/* score */
.srow{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.sring{width:66px;height:66px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.sn{font-size:22px;font-weight:600;line-height:1}
.ss{font-size:8px;letter-spacing:.05em;text-transform:uppercase;margin-top:1px;opacity:.65}
.rp{border-color:#2B6D2E;background:#D4F1D6;color:#2B6D2E}
.rw{border-color:#6B601C;background:#FAF7C7;color:#6B601C}
.rf{border-color:#6B2D2D;background:#FFE9EB;color:#6B2D2D}
.smeta{flex:1}
.sv{font-size:14px;font-weight:500;color:var(--d);margin-bottom:7px}
.btrack{height:4px;background:var(--st);border-radius:2px;overflow:hidden}
.bfill{height:100%;border-radius:2px;transition:width .7s ease}
/* grid */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.cc{background:#fff;border:1.5px solid var(--st);border-radius:9px;padding:11px 11px 9px;cursor:pointer;transition:.1s}
.cc:hover,.cc.active{border-color:var(--t)}
.cc.active{background:var(--lm)}
.cc.sp{border-color:#6AD495}.cc.sw2{border-color:#FFE86D}.cc.sf{border-color:#F57D84}
.cc.active.sp{background:#f1fbf3}.cc.active.sw2{background:#fffef0}.cc.active.sf{background:#fff4f4}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cico{font-size:15px}
.cpill{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:99px}
.pp{background:#D4F1D6;color:#2B6D2E}.pw{background:#FAF7C7;color:#6B601C}.pf{background:#FFE9EB;color:#6B2D2D}
.cn{font-size:11px;font-weight:500;color:var(--d)}
.cs{font-size:10px;color:#aaa;margin-top:1px}
/* detail */
.det{background:#fff;border:1px solid var(--st);border-radius:11px;padding:18px 20px;display:none}
.det.vis{display:block}
.dhead{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.dst{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.dsp{background:#D4F1D6;color:#2B6D2E}.dsw{background:#FAF7C7;color:#6B601C}.dsf{background:#FFE9EB;color:#6B2D2D}
.dtitle{font-size:13px;font-weight:500;flex:1;color:var(--d)}
.dsc{font-size:11px;color:#aaa}
.frows{display:flex;flex-direction:column;gap:11px}
.flbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.flp{color:#2B6D2E}.fli{color:#c0392b}.flr{color:var(--t)}
.flist{display:flex;flex-direction:column;gap:5px}
.fitem{display:flex;align-items:flex-start;gap:7px;font-size:12.5px;color:#444;line-height:1.55}
.fdot{width:5px;height:5px;border-radius:50%;margin-top:7px;flex-shrink:0}
.fdp{background:#2B6D2E}.fdi{background:#c0392b}.fdr{background:var(--t)}
.fna{font-size:12px;color:#aaa;font-style:italic}
.errbx{background:#fff4f4;border:1px solid #F57D84;border-radius:8px;padding:12px 14px;font-size:12px;color:#c0392b;line-height:1.6;margin-top:12px}
</style>
</head>

<script>
(function () {
'use strict';

var API       = 'https://api.anthropic.com/v1/messages';
/* Set to true ONLY if you configured ACCESS_PASSWORD on the server. Leave false for no password gate. */
window.BSF_REQUIRE_PW = false;
var imageB64  = null;
var imageMime = 'image/jpeg';
var sampledHexes = [];

var dropZone   = document.getElementById('dropZone');
var fileInput  = document.getElementById('fileInput');
var analyzeBtn = document.getElementById('analyzeBtn');
var rightPanel = document.getElementById('rightPanel');
var checkList  = document.getElementById('checkList');

/* ── upload ──────────────────────────────────────────────── */
dropZone.addEventListener('click', function (e) {
  if (e.target.tagName === 'BUTTON') return;
  fileInput.click();
});
dropZone.addEventListener('dragover', function (e) {
  e.preventDefault(); dropZone.classList.add('over');
});
dropZone.addEventListener('dragleave', function () {
  dropZone.classList.remove('over');
});
dropZone.addEventListener('drop', function (e) {
  e.preventDefault(); dropZone.classList.remove('over');
  var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) readImage(f);
});
fileInput.addEventListener('change', function () {
  if (fileInput.files && fileInput.files[0]) readImage(fileInput.files[0]);
  fileInput.value = '';
});

function readImage(file) {
  if (!file.type.startsWith('image/')) return;

  var reader = new FileReader();
  reader.onload = function (ev) {
    var original = ev.target.result;
    var img = new Image();

    img.onerror = function () {
      rightPanel.innerHTML = '<div class="cmsg"><div class="ico">&#9888;</div><h2>Could not read image</h2><p>Try a different file.</p></div>';
    };

    img.onload = function () {
      /* ── 1. Resize: cap longest side at 2048px for good AI detail ── */
      var MAX = 2048;
      var w = img.naturalWidth  || img.width;
      var h = img.naturalHeight || img.height;

      if (w === 0 || h === 0) {
        rightPanel.innerHTML = '<div class="cmsg"><div class="ico">&#9888;</div><h2>Image has zero dimensions</h2></div>';
        return;
      }

      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }

      /* ── 2. Draw onto canvas with white background (handles PNG transparency) ── */
      var canvas = document.createElement('canvas');
      canvas.width  = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      /* ── 3. Sample colors before encoding ── */
      sampledHexes = sampleColors(ctx, w, h);

      /* ── 4. Encode: try high-quality JPEG, shrink until under 4 MB ── */
      var quality = 0.95;
      var dataURL, b64;
      do {
        dataURL = canvas.toDataURL('image/jpeg', quality);
        b64     = dataURL.split(',')[1];
        quality = Math.round((quality - 0.10) * 100) / 100;
      } while (b64 && b64.length > 5400000 && quality > 0.30);
      /* 5 400 000 base64 chars ≈ 4 MB binary — well within Anthropic's 5 MB limit */

      imageB64  = b64;
      imageMime = 'image/jpeg';

      /* ── 5. Preview ── */
      dropZone.className = 'drop filled';
      dropZone.innerHTML =
        '<img src="' + dataURL + '" alt="preview">' +
        '<button class="chgbtn">Change</button>';
      dropZone.querySelector('.chgbtn').addEventListener('click', function (ev) {
        ev.stopPropagation(); fileInput.click();
      });

      analyzeBtn.disabled = false;
      rightPanel.innerHTML =
        '<div class="cmsg"><div class="ico" style="opacity:.5">&#10003;</div>' +
        '<h2>Ready — click Analyze</h2>' +
        '<p style="font-size:11px;color:#bbb">' + w + ' × ' + h + 'px · ' +
        Math.round(b64.length * 0.75 / 1024) + ' KB</p></div>';
    };

    img.src = original;
  };

  reader.onerror = function () {
    rightPanel.innerHTML = '<div class="cmsg"><div class="ico">&#9888;</div><h2>File read error</h2><p>Could not load the file.</p></div>';
  };

  reader.readAsDataURL(file);
}

/* ── color sampling ──────────────────────────────────────── */
function sampleColors(ctx, w, h) {
  var samples = [];
  var step = Math.max(1, Math.floor(Math.min(w, h) / 60));
  for (var y = 0; y < h; y += step) {
    for (var x = 0; x < w; x += step) {
      var d = ctx.getImageData(x, y, 1, 1).data;
      if (d[3] < 128) continue;
      samples.push([d[0], d[1], d[2]]);
    }
  }
  var clusters = [];
  for (var i = 0; i < samples.length; i++) {
    var s = samples[i], found = false;
    for (var j = 0; j < clusters.length; j++) {
      var cl = clusters[j];
      var dr = s[0]-cl[0][0], dg = s[1]-cl[0][1], db = s[2]-cl[0][2];
      if (Math.sqrt(dr*dr+dg*dg+db*db) < 20) {
        cl[1]++;
        cl[0][0] = Math.round((cl[0][0]*(cl[1]-1)+s[0])/cl[1]);
        cl[0][1] = Math.round((cl[0][1]*(cl[1]-1)+s[1])/cl[1]);
        cl[0][2] = Math.round((cl[0][2]*(cl[1]-1)+s[2])/cl[1]);
        found = true; break;
      }
    }
    if (!found) clusters.push([[s[0],s[1],s[2]], 1]);
  }
  clusters.sort(function(a,b){ return b[1]-a[1]; });
  return clusters.slice(0,10).map(function(cl){
    return '#'+pad(cl[0][0])+pad(cl[0][1])+pad(cl[0][2]);
  });
}

function pad(n) {
  var h = n.toString(16);
  return h.length === 1 ? '0' + h : h;
}



/* ── check toggles ───────────────────────────────────────── */
checkList.addEventListener('click', function (e) {
  var row = e.target.closest('.chk');
  if (row) row.classList.toggle('on');
});

function getKeys() {
  return Array.prototype.map.call(
    document.querySelectorAll('.chk.on'),
    function (el) { return el.getAttribute('data-k'); }
  );
}

/* ── titles / icons ──────────────────────────────────────── */
var TITLES = {
  colors:'Color Palette', typography:'Typography', logo:'Logo Usage',
  layout:'Layout & Spacing', art_direction:'Art Direction', social:'Social Media'
};
var ICONS = {
  colors:'🎨', typography:'🔤', logo:'🏷',
  layout:'📐', art_direction:'📸', social:'📱'
};

/* ── BSF rules ───────────────────────────────────────────── */
var BSF_COLORS = 'White #FFFFFF, BSF Deep Teal #002A30, BSF Concrete #CCD4D6, BSF Teal #0D6976, BSF Mint #91DFDA, BSF Light Mint #DEF6F4';

var RULES = {
  colors:
    'BSF has 5 primary brand colors: White #FFFFFF (40% of design), BSF Deep Teal #002A30 (30%), BSF Concrete #CCD4D6 (15%), BSF Teal #0D6976 (10%), BSF Mint #91DFDA (5%). ' +
    'BSF Deep Teal also exists in tints from 5% to 90% opacity — these are valid for digital backgrounds. BSF Concrete IS Deep Teal at 20% opacity. ' +
    'CORRECT TEXT PAIRINGS: ' +
    'On WHITE background: use BSF Teal (preferred), BSF Deep Teal, or BSF Concrete (crests only). ' +
    'On BSF DEEP TEAL background: use White or BSF Mint. ' +
    'On BSF CONCRETE background: use BSF Teal, BSF Deep Teal, or White (crests only). ' +
    'On BSF TEAL background: use White only. ' +
    'On BSF MINT background: use BSF Deep Teal only. ' +
    'FUNCTIONAL COLORS — valid ONLY in specific contexts, never as decorative brand colors: ' +
    '(A) DIGITAL UI states: Light Mint #DEF6F4 and BSF Mint for primary actions; Positive=Light Green #D4F1D6 bg with Dark Green #2B6D2E text; Warning=Light Yellow #FAF7C7 bg with Dark Yellow #6B601C text; Negative=Light Red #FFE9EB bg with Dark Red text. ' +
    '(B) INFOGRAPHICS only: Green #6AD495, Yellow #FFE86D, Red #F57D84 as chart fill colors with BSF Deep Teal text. ' +
    'NEVER use functional bright greens, yellows, or reds as background panels, headline colors, or decorative elements in brand communications. ' +
    'CRITICAL EXEMPTIONS — do NOT flag: ' +
    '(1) All colors inside a phone screen, app UI mockup, or digital product screenshot — ignore completely. ' +
    '(2) White that appears slightly warm due to photo lighting or compression is still White — only flag if clearly cream or beige. ' +
    '(3) Colors close to an approved color are compliant — only flag colors clearly and significantly different from ALL approved colors. ' +
    '(4) Deep Teal tints from 5% to 90% are valid digital background fills. ' +
    '(5) Infographic chart bars in Green, Yellow, or Red are valid for data sentiment. ' +
    'REAL VIOLATIONS: a clearly off-brand color used as a major design element — e.g. bright purple, hot pink, lime green, bright blue, bright orange used as a background, large text color, or panel outside of a phone mockup or infographic context.',

  typography:
    /* ── FONTS ──────────────────────────────────────────────── */
    'BSF PRIMARY FONT: Codec Pro (Latin and Arabic versions). This is the only brand font for all official communications. ' +
    'FALLBACK FONT: Poppins (English) and Cairo (Arabic) — Google Fonts used ONLY when Codec Pro is unavailable. ' +
    'SYSTEM FONT: Arial Unicode MS — email-safe fallback, only when Codec Pro and Google Fonts are both unavailable. ' +
    'VIOLATIONS: serif fonts (Times New Roman, Georgia etc.); decorative or handwritten script fonts; any font clearly not Codec Pro or Poppins family. ' +

    /* ── WEIGHT ──────────────────────────────────────────────── */
    'FONT WEIGHT: Regular is the primary weight used for almost everything. ' +
    'Bold is only used in two specific cases: (1) as a highlight within long body copy, (2) to add hierarchy in high-density documents like reports, emails, or presentations where changing type size is not practical. ' +
    'Bold must NEVER be used as the default weight for headlines or titles — type size creates hierarchy, not Bold. ' +
    'WEIGHT VIOLATIONS: Bold used as the headline weight in layouts; Bold used as a substitute for proper typographic scale. ' +

    /* ── ALIGNMENT ───────────────────────────────────────────── */
    'ALIGNMENT RULES — strict and non-negotiable: ' +
    'English text is ALWAYS left-aligned. ' +
    'Arabic text is ALWAYS right-aligned. ' +
    'NEVER use justified text (creates rivers of white space, looks too formal). ' +
    'NEVER center-align headlines, body copy, or any paragraph text. ' +
    'HOW TO DISTINGUISH RIGHT-ALIGNED FROM CENTERED: right-aligned Arabic has its RIGHT edge flush to the margin with a ragged left edge and uneven line lengths. Centered text has equal space on both sides. A wide Arabic headline is right-aligned, not centered. NEVER flag Arabic text as centered. ' +
    'MARGIN RULES (from 4.3.2): ' +
    'For English text: the right open space must be at least 2X wider than the left margin — text anchors left, large open space on the right. ' +
    'For Arabic text: the left open space must be at least 2X wider than the right margin — text anchors right, large open space on the left. ' +
    'A design where text block has equal space on both sides looks too centred and violates this rule. ' +

    /* ── CAPITALIZATION ──────────────────────────────────────── */
    'CAPITALIZATION: ALL CAPS is ONLY allowed for small signposting labels (e.g. category tags, navigation labels at XS size). ' +
    'NEVER use ALL CAPS for headlines, titles, or body paragraphs. ' +

    /* ── TEXT ON COLORS — from 4.3.3 ────────────────────────── */
    'TEXT COLOR RULES: ' +
    'On WHITE bg: use Deep Teal for titles and body copy; BSF Teal for subtitles and links (two-color approach). ' +
    'On DEEP TEAL bg: use White for titles and body copy; BSF Mint for subtitles and links (two-color approach). ' +
    'On BSF TEAL (#0D6976) background: White is the ONLY valid text color. Deep Teal text on BSF Teal is explicitly a VIOLATION — the colors are too similar and visually collapse. ' +
    'On BSF CONCRETE background: BSF Deep Teal ONLY for all text. BSF Teal as text on a Concrete background is a violation — only one color (Deep Teal) is valid here. ' +
    'On BSF MINT background: BSF Deep Teal ONLY for all text. ' +
    'TYPOGRAPHY COLOR VIOLATIONS: ' +
    'Any text color other than White on a BSF Teal (#0D6976) background — only White is valid on BSF Teal; ' +
    'BSF Teal or any non-Deep-Teal color used as text on a BSF Concrete background (Deep Teal is the only valid text color on Concrete); ' +
    'BSF Mint or BSF Teal used as the PRIMARY text color on White (Mint/Teal can only be used for subtitles or links on White, not titles or body); ' +
    'BSF Concrete used as a text color (ever — it is never a text color); ' +
    'BSF Mint used as a background color behind body text (Mint is only valid as background for CTAs/buttons, not for text panels). ' +

    /* ── OTHER VIOLATIONS ────────────────────────────────────── */
    'HIERARCHY CONTRAST RULE (from 4.3.2): Titles must be visually larger than body copy — the size difference should be immediately clear. ' +
    'Violations: (1) Title text appears the same size as body copy — no visible hierarchy; (2) Subtitle or supporting text is so small relative to the title it is barely legible; (3) Title text is so small it does not read as a headline. ' +
    'Note: only titles are affected — do NOT flag very small disclaimer/T&C text. T&C blocks at the minimum size (4XS, approximately 7px equivalent) are valid and expected. ' +

    'OTHER VIOLATIONS: italic text style; justified text; title and body text at the same size with no visible hierarchy. ' +

    /* ── NOT VIOLATIONS ──────────────────────────────────────── */
    'NOT violations: Arabic text that is right-aligned (always correct); Arabic headline spanning most of the frame width (right-aligned, not centered — never flag it); Poppins or Cairo used as fallback when Codec Pro is unavailable; Bold weight used as a highlight within running body copy or in a dense report/email/presentation; T&C or disclaimer text blocks at very small size (7px / 4XS) are the correct minimum — do not flag them; standalone Bold phrases within body copy are valid inline emphasis.',

  logo:
    /* ── CONSTRUCTION ───────────────────────────────────────── */
    'The BSF logo is always the hexagon crest symbol combined with the BSF wordmark as one indivisible unit. They must NEVER be separated or used independently in brand communications. ' +
    'The gap between the symbol and BSF wordmark is 3X the width of the vertical strokes in the symbol. ' +

    /* ── VALID COLOR VERSIONS ────────────────────────────────── */
    'LOGO COLOR VERSIONS — exact rules from guidelines: ' +
    'On WHITE background: use the BSF Deep Teal logo version. ' +
    'On BSF DEEP TEAL background: use the White logo version OR the BSF Mint logo version. ' +
    'On BSF TEAL background: use the White logo version only. ' +
    'On PHOTOGRAPHY (any photo): use White logo OR Deep Teal logo — whichever has more contrast against the photo area it sits on. ' +
    'BSF TEAL logo version is for MOTION (animation/video) ONLY — never use it on static designs. ' +

    /* ── VALID POSITIONS ─────────────────────────────────────── */
    'VALID LOGO POSITIONS: The logo locks to the layout magnetic guides and can appear at SIX positions — any of the 4 corners (top-left, top-right, bottom-left, bottom-right) OR the center-left (horizontal midpoint on the left margin) OR the center-right (horizontal midpoint on the right margin). All six are correct. ' +
    'A logo at the horizontal midpoint on the left or right edge is a valid center-left or center-right magnetic position — do NOT flag it. ' +
    'The only invalid position is logo placed dead-center in the layout (equidistant from all 4 edges) or floating with no margin anchoring. ' +

    /* ── SIZE AND SAFE AREA ──────────────────────────────────── */
    'MINIMUM SIZE: 16px height for digital. 6mm height for print. Flag a logo that appears too small to be legible at screen size. ' +
    'SAFE AREA: The logo requires clear space around it equal to the width of the symbol on all sides. No other elements should crowd into this zone. ' +

    /* ── LOCKUPS AND SUB-BRANDS ──────────────────────────────── */
    'SUB-BRAND LOGOS: BSF Corporate, BSF Private, BSF Personal, BSF Capital, BSF Academy, and BSF Jana are valid BSF logo lockups. Do not flag these as incorrect logo usage. ' +
    'CO-BRANDING: BSF logo plus a partner logo separated by a vertical divider bar is valid (partnership format). "Powered by BSF" with the BSF logo is also valid (endorsement format). ' +

    /* ── VIOLATIONS ──────────────────────────────────────────── */
    'VIOLATIONS to flag: hexagon crest symbol used alone without the BSF wordmark; BSF wordmark used alone without the crest symbol; BSF Teal logo used on a static (non-motion) design; wrong logo color for the background (e.g. Deep Teal logo on Deep Teal background, or White logo on White background, causing it to disappear); logo illegible due to low contrast against the photo or background; logo visibly stretched, rotated, shadowed, outlined, recolored, or modified in any way; logo positioned dead-center in the layout. ' +
    'NOT violations: logo at any of the 6 magnetic positions; White or Deep Teal logo on photography; BSF Mint logo on Deep Teal background; sub-brand lockups (BSF Corporate etc.); co-branding with partner logo.',

  layout:
    /* ── GRID FOUNDATIONS (4.5.1 pp.380-384) ─────────────────────── */
    'FOUNDATIONS: BSF layouts are built on geometry and symmetry. The frame is divided into FOUR EQUAL QUADRANTS by the vertical and horizontal center axes. Columns run in multiples of six (hexagon logic) and the column count varies per format to keep visual balance. ' +
    'The internal margins plus the vertical and horizontal axes act as MAGNETS — all elements (logo, title, subheading, URL) snap to these guides. The column system also sets the LOGO SIZE per layout, so the logo should look proportional to the format — neither dominating nor microscopic. ' +
    'A secondary SIX-ROW system (equal-height rows starting at the margin edge, not the frame edge) positions elements vertically: titles anchor at the top of their quadrant area; subheading, copy, and URL anchor lower in the quadrant. ' +
    'BALANCE PRINCIPLE (Construction p.385): the logo and the text quadrant can combine in many positions, but they are always placed to create balance and symmetry — often at different levels or opposite areas of the frame, never crammed randomly together. ' +

    /* ── WHITE SPACE (pp.387-388) ────────────────────────────────── */
    'WHITE SPACE: The scale and placement of elements must leave generous white space — this is a core brand value (keep it simple) and applies to print AND digital. An overcrowded layout stuffed with elements, long copy blocks, or no breathing room is a VIOLATION. Generous empty space is intentional and is NEVER a violation. ' +

    /* ── THREE VALID MODES (4.5.2) ───────────────────────────────── */
    'BSF uses a quadrant layout system with three valid modes — identify the mode FIRST before judging anything: ' +

    'MODE 1: FULL BLEED — The photograph fills the entire frame edge to edge. Text and logo sit directly over the photograph, locked to the magnetic guides and arranged like invisible 1/4 quadrants (title at top of its quadrant area, subheading/copy/URL at its base). ' +
    'Full bleed REQUIRES visually quiet space (sky, plain wall, open ground, shadow area) under the text, and HIGH CONTRAST between text color and the background image. ' +
    'Full bleed solid-color backgrounds are also valid — any of the 4 primary colors (White, Deep Teal, Concrete, BSF Teal) can fill the entire frame with text over it. Priority order when choosing: White first, then Deep Teal, then Concrete, then BSF Teal. ' +
    'FULL BLEED CREST USAGE (p.398): a solid-color full bleed carrying a LARGE crest line-art graphic, or a crest graphic combined with a cutout product photo (e.g. a hand holding a phone), is a VALID and on-brand layout. Text and logo snap to the corners within the margin. ' +
    'FULL BLEED RULE 1: Do not use BSF Mint or BSF Teal as text color on a photographic full-bleed image — these lack contrast against photos. ' +
    'FULL BLEED RULE 2: Do not use full bleed layout with a busy complex photographic background that has no quiet corner — text becomes unreadable. ' +
    'FULL BLEED RULE 3: Do not overlap text and image if the text area clashes with busy photo detail and is hard to read — move the text to a quieter quadrant instead. ' +
    'FULL BLEED RULE 4 (p.397): NEVER use full bleed with PARTNERSHIP PHOTOGRAPHY (third-party or partner-supplied imagery, e.g. partner product shots). Partnership imagery must use a quarters or halves layout instead. ' +

    'MODE 2: QUARTERS (1/4) — One corner quadrant is a solid White or Deep Teal color panel holding text and URL. The remaining three quadrants show the photograph. The panel can be moved to ANY corner while the logo locks to the magnetic guides (on the photo area or adjacent). ' +
    'QUARTERS CONTENT LOCK (p.402): wherever the panel moves, the content INSIDE it stays locked in place — title anchored at the top of the panel, subheading/copy/URL anchored at the bottom of the panel. Text floating vertically centered or randomly inside the panel breaks the system. ' +
    'BSF Mint may be used inside the panel as an ACCENT color to highlight CTAs or URLs only — never for titles or body copy. ' +
    'QUARTERS RULE: Do not position the panel so it covers a core important part of the subject in the photograph (e.g. covering a face or the main subject). ' +
    'QUARTERS CREST RULE: crest graphics are NEVER placed inside a 1/4 quarter panel — too cramped. ' +

    'MODE 3: HALVES (50/50) — The layout splits 50/50 between a solid color panel with text and a photograph. Use halves when MORE EMPHASIS on the copy is needed. Can be a vertical split (panel left/right) or horizontal split (panel top/bottom); the horizontal split is added flexibility for formats wider than 1:1. The logo stays fixed to the magnetic guides while the panel moves. ' +
    'HALVES HIERARCHY (p.408): for clear hierarchy the logo acts as lead or sign-off, positioned at a DIFFERENT level than the text (e.g. text top of panel, logo bottom). ' +
    'HALVES CREST USAGE (p.413): a cropped crest (always a pre-cropped asset) may be added to 50/50 layouts as a secondary decorative asset complementing the image — this is VALID. ' +
    'HALVES RULE: Do not create awkward crops of the subject when the 50/50 line divides the image (cutting at a joint, mid-face, or mid-body). ' +

    /* ── PANEL COLOR RULE (pp.404, 411) ──────────────────────────── */
    'PANEL COLOR RULE (applies to Mode 2 and Mode 3): The solid color panel MUST be White or BSF Deep Teal ONLY. ' +
    'BSF Concrete, BSF Teal, BSF Mint, or any other color as a solid text panel background is a VIOLATION. ' +
    'Choose the panel color that best complements the surrounding imagery. When NO logo is present in the design, lead with a Deep Teal panel to enhance brand presence (advisory — a White panel without a logo is a minor note, not a hard violation). ' +

    /* ── EXTREME FORMATS (pp.396, 410) ───────────────────────────── */
    'EXTREME FORMATS (hyper-horizontal banners, hyper-vertical skyscrapers): keep text MINIMAL (one short line plus URL) and focus on strong, clean, wide-shot brand imagery. Tight crops of the brand flag/pattern work best. For hyper-vertical formats the image itself must have a strong vertical orientation. Long multi-line copy crammed into an extreme format is a VIOLATION. ' +

    /* ── HOW TO IDENTIFY THE MODE ─────────────────────────────────── */
    'IDENTIFICATION STEPS — check in order: ' +
    'Step 1: Does the photo (or a solid color, or a large crest graphic) fill 100% of the frame with no separate solid color panel? → Mode 1 Full Bleed. Judge whether text is in a quiet area. ' +
    'Step 2: Is there a solid color block covering roughly one corner quadrant (about 25% of the frame)? → Mode 2 Quarters. Check panel color (White or Deep Teal only) and content anchoring. ' +
    'Step 3: Is the design split roughly 50/50 between a solid color area and photo? → Mode 3 Halves. Check panel color and whether the crop is awkward. ' +

    /* ── REAL VIOLATIONS ─────────────────────────────────────────── */
    'REAL VIOLATIONS to flag: ' +
    '(A) Text placed over a visually busy, complex photographic area with no quiet zone — making the text unreadable. ' +
    '(B) A panel using BSF Mint, BSF Teal, BSF Concrete, or any off-brand color instead of White or Deep Teal. ' +
    '(C) In full bleed, BSF Mint or BSF Teal used as text color on a photograph. ' +
    '(D) Quarter panel covering the core subject of the photo (face, main figure). ' +
    '(E) Halves layout creating an awkward mid-body crop of the main subject. ' +
    '(F) Completely random element placement with no corner anchoring, no margin snapping, and no quadrant logic. ' +
    '(G) Overcrowded layout with no white space or breathing room. ' +
    '(H) Partnership or third-party photography used in a full-bleed layout. ' +
    '(I) Extreme format (very wide banner or very tall vertical) crammed with long copy instead of minimal text. ' +
    '(J) Crest graphic placed inside a 1/4 quarter panel. ' +
    '(K) Logo dramatically oversized (dominating the frame) or too small to read, out of proportion with the grid. ' +

    /* ── NOT VIOLATIONS ──────────────────────────────────────────── */
    'NOT VIOLATIONS — never flag these: ' +
    'Text or logo sitting over a quiet low-detail corner of a full-bleed photo; White or Deep Teal panel beside a photo; logo at any of the six magnetic positions; generous white space or large empty areas; a solid color full-bleed background in any primary color; a large crest line-art graphic filling a solid-color full bleed; a cropped crest decorating a 50/50 layout; Concrete or Teal used as the photographic background (not as a text panel); Mint used only on a CTA or URL inside a panel.',

  art_direction:
    /* ── LIGHTING ─────────────────────────────────────────── */
    'LIGHTING RULES: BSF uses ONLY natural lighting. Two styles are permitted: ' +
    '(A) HARD LIGHT — bright directional source, high contrast, sharp defined shadows, strong focal point. The lit areas pop against dark shadows. ' +
    '(B) SOFT LIGHT — diffused source, gentle wrap-around shadows, flattering on faces, lower contrast, atmospheric mood. ' +
    '(C) NIGHT SHOTS — embrace contrast; natural ambient light enhanced only to highlight what is already there; never flat or 2D; blacks balanced against bright elements. ' +
    'LIGHTING VIOLATIONS: flat even lighting with no shadows or depth (studio softbox ring-light look); fluorescent or obvious artificial indoor lighting without any natural quality; overexposed blown-out scenes with loss of detail; dark scenes with no directional light source and no bright element to pull focus — note that valid night shots CAN be very dark as long as there is a specific light source or bright highlight creating contrast and depth (darkness alone is not a violation; flat darkness with nothing pulling the eye is); flash photography that creates flat unnatural highlights. ' +
    /* ── COLOR GRADING ──────────────────────────────────────── */
    'GRADING RULES: The BSF grade is inspired by regional light. Required adjustments: saturation reduced slightly (-5 to -10%), contrast reduced slightly (-5 to -10%), brightness increased slightly (+10%), white levels lifted (+5 to +10%), with a subtle warm tint. ' +
    'Two grading approaches are valid: (1) SINGLE TONE — image has one dominant tone (approx 70% of frame) with secondary accent tones (approx 30%) adding contrast and cut-through; (2) MULTIPLE TONES — broader palette used, but approx 50% of the frame must remain in neutral/muted tones to act as a neutralizer maintaining harmony. ' +
    'GRADING FALSE POSITIVE GUARD — naturally warm tones are valid and must NOT be flagged: Saudi landscapes with warm golden sand, desert dunes in amber/ochre light, golden-hour architecture, and any scene where warm tones come from the natural environment or time of day are compliant single-tone examples. Only flag warmth that looks like an artificial post-processing filter (heavy orange/amber cast applied globally that makes skin tones orange or shadows amber). Similarly, multiple-tone images can have vivid color zones — blue skies, green foliage, red flowers — as long as the neutral/muted portion of the frame (walls, ground, architecture) is approximately 50% of the composition. Do NOT flag vivid environmental colors in a multi-tone image that still has a strong neutral base. ' +
    'GRADING VIOLATIONS: heavy warm orange or amber Instagram-style filter; heavy cool blue-tinted grade that feels cold and corporate; over-saturated vivid colours that clash with BSF brand palette; heavy desaturation or near-monochrome treatment; aggressively high contrast with crushed blacks and blown highlights; heavy vignetting darkening corners; HDR or overly processed look. ' +
    /* ── COMPOSITION ────────────────────────────────────────── */
    'COMPOSITION RULES: BSF uses a complexity spectrum from simple (lots of clear quiet space for messaging) to complex (full-bleed content-dense). Both are valid. ' +
    'Simple images must have quiet areas that allow text and logo to sit cleanly. Complex images must use the quadrant system to organize elements. ' +
    'Framing uses two techniques: ANGLES (eye-level, low-angle for scale and energy, high-angle bird-eye) and LEADING LINES (graphic lines within the environment that guide the eye to a focal point and break the frame). ' +
    'COMPOSITION VIOLATIONS: chaotic busy frame with no focal point and no quiet zone; subjects cropped awkwardly or cut at joints; no clear subject or point of interest; random element placement with no geometric structure; interfering elements — foreground or midground objects (furniture, props, other people) that visually compete with the primary subject and fragment the viewer\'s attention, preventing a clear undisturbed focal point. ' +
    /* ── SUBJECT AND AUTHENTICITY ───────────────────────────── */
    'SUBJECT AND AUTHENTICITY RULES: Photography must feel real and grounded. People must appear natural and unposed in genuine exchanges. Environments must feel lived-in and authentic — Saudi landscapes, architecture, cityscapes and local scenes are preferred. Global settings are acceptable only when relevant. ' +
    'AUTHENTICITY AND PEOPLE VIOLATIONS (from 4.8.2 and 4.8.6): ' +
    'STUDIO VIOLATIONS: people posed against a plain white studio backdrop or a solid-color photographic studio background — BSF does NOT shoot people in studios for brand communications. IMPORTANT CORPORATE HEADSHOT EXCEPTION: BSF corporate headshots ARE shot in real-world corporate/architectural environments (office corridors, glass-walled spaces, architectural settings) and use shallow depth of field to create heavy background blur — these must NOT be flagged as studio shots even if the blurred background looks minimal. The distinguishing test is: is there a real-world environment context visible (however blurred)? If yes, it is valid. Only flag if the background is an obviously plain white or solid-color studio backdrop with no real-world context at all. ' +
    'STUDIO EXCEPTION: studio cutout shots of people or products ARE allowed ONLY when they are placed on top of a BSF crest (crest+cutout format). In this context, clothing and styling must be neutral. ' +
    'EXPRESSION VIOLATIONS: forced smiles, staged or theatrical expressions, manufactured cheerfulness — people must look natural and genuine; ' +
    'POSTURE VIOLATIONS: people who appear to be slouching, hunching, or visibly disengaged — people must always be positioned actively and appear alert, confident, and engaged; ' +
    'BACKGROUND VIOLATIONS: cluttered or noisy backgrounds that distract from the subject — contexts must be clean, real, relevant environments; ' +
    'STOCK VIOLATIONS: obviously generic Western stock photography with no Saudi or regional identity; ' +
    'BANKING CLICHE VIOLATIONS (always flag): stacks of coins or paper money; close-up hands exchanging cash; piggy banks; graphs and chart printouts as hero imagery; calculators as props; handshake over a desk as primary subject; men in suits pointing at whiteboards. ' +
    /* ── PRINCIPLES ─────────────────────────────────────────── */
    'ANGLE PRINCIPLE: photography should seek interesting angles inspired by hexagonal geometry — diagonal lines, architectural frames, geometric patterns in environments. Flat straight-on symmetrical shots with no angular interest are weaker but not a hard violation unless combined with other issues. ' +
    /* ── SCORING GUIDANCE ───────────────────────────────────── */
    'PLACES AND ENVIRONMENT RULES: Landscape images must include human context (a person or human-made element). Architecture should convey aspiration and scale. Home environments must look elevated and sensitively styled. ' +
    'PRODUCT PHOTOGRAPHY RULES: Product devices (phones, cards) should appear in realistic in-situ situations, not floating on plain white backgrounds. Card compositions can be flat (bird-eye clean, any number of cards) or volumetric/3D (clean cascade, max 2 cards in frame). ' +
    'PRODUCT GRADING RULE: Product photography must maintain BSF muted tone grading — high contrast setups or saturated non-BSF background colors behind a product are violations even if the product is physically held in-situ (e.g. phone held against a vivid yellow background = violation). The environment surrounding the product must follow the same muted, warm-neutral BSF grade as all other photography. ' +
    'PRODUCT RENDER/MOCKUP RULE: For product renders and mockups (digitally composited scenes), the background must be BSF Concrete (#CCD4D6) or BSF Deep Teal (#002A30) only — any other background color is a violation. ' +
    'HOW TO SCORE: If you see ONE hard violation (banking cliche, fluorescent studio lighting, heavy orange grade, generic Western stock, over-saturated) score 35-54 and status fail. If you see a soft issue (slightly busy composition, mildly warm grade, minor authenticity concern) score 55-74 and status warn. If everything looks compliant score 75-100. ' +
    'IMPORTANT: Always name the SPECIFIC violation you see. Do not write generic phrases like "photography may not meet guidelines". Say exactly what is wrong — e.g. "Flat ring-light studio lighting with no shadows visible, violating the natural light requirement" or "Image shows a handshake over a desk — a classic banking cliche explicitly prohibited".',

  social:
    /* ── FORMATS (4.7.3) ──────────────────────────────────── */
    'SOCIAL MEDIA FORMATS: ' +
    'Square 1:1 — Instagram and Facebook (default for both). ' +
    'Portrait 5:4 — Instagram and Facebook. ' +
    'Story 16:9 (tall vertical) — Instagram and Facebook. ' +
    'Post 1.7:1 (landscape) — Twitter only. ' +
    'Post 1.77:1 (landscape) — LinkedIn only. ' +
    'Reference size for all social typography is 1080px. ' +

    /* ── INSTAGRAM POST LAYOUT TYPES (4.7.3) ───────────────── */
    'INSTAGRAM POST — four valid layout types: ' +
    '(A) FULL GRAPHICS: no photography; use iconography or illustration as the visual. ' +
    '(B) 50/50 QUADRANT: equal image/panel split; pair with rich media or photography. ' +
    '(C) 1/4 QUADRANT: one corner is a solid color text panel (~25% of frame); rest shows the photo. ' +
    '(D) FULL-BLEED IMAGE: photography or illustration fills the entire frame; copy sits over a clean area. ' +

    /* ── LAYOUT RULES (4.7.2) ────────────────────────────── */
    'LAYOUT RULES: ' +
    '(1) QUADRANT RATIO is fixed — never change the 1/4 or 50/50 proportions. ' +
    '(2) Match quadrant size to word count — a long headline needs a larger panel. ' +
    '(3) English text is ALWAYS left-aligned on social posts. Never right-align English. ' +
    '(4) Never obscure the essential subject of the photo with a panel. ' +
    '(5) Crests are NEVER placed inside a 1/4 quarter panel. Crests only on full-bleed or 50/50 layouts. ' +

    /* ── TYPOGRAPHY SCALE (4.7.2) ──────────────────────────── */
    'SOCIAL TYPOGRAPHY SCALE (at 1080px reference): ' +
    'XXXL 110px (max 35 chars / 2 lines), XXL 80px (max 50 chars / 2 lines), XL 65px (max 75 chars / 3 lines), L 50px, M 35px, S 20px, XS 16px, XXS 12px, XXXS 9px, 4XS 7px (T&Cs only). ' +
    'T&Cs must use 4XS (7px) minimum. 4XS is exclusively for legal disclaimer text — never for body copy. ' +

    /* ── CONTENT TYPES AND ASSET RULES (4.7.1) ───────────────── */
    'CONTENT TYPES — four types with specific allowed assets: ' +
    'MASTER BRAND: BSF photography + iconography only. No third-party imagery. No illustration. ' +
    'PARTNERSHIPS & PROMOTIONS: photography, mockups, illustration, crests & patterns, iconography, and third-party imagery are all valid. ' +
    'PRODUCT LED: photography + mockups + third-party imagery only. No illustration. No crests or patterns. ' +
    'WARNING MESSAGES: mockups + iconography only. NO illustration — explicitly prohibited for warnings. NO third-party imagery. ' +
    'ILLUSTRATION RULE: illustration is ONLY valid in Partnerships & Promotions posts. Never in warning, safety, or master brand posts. ' +
    'CRESTS & PATTERNS: valid for Master brand and Partnerships & Promotions only. Never in Product led. Never in 1/4 quarter panels. ' +

    /* ── INSTAGRAM PORTRAIT POST (4.7.3) ───────────────────── */
    'INSTAGRAM PORTRAIT POST (1080x1350px) ZONES: ' +
    'TOP ZONE (hidden in profile grid view) — logos and T&Cs should live here. ' +
    'BOTTOM ZONE (always visible in feed and profile) — key headline and main message must be here. ' +
    'Never place key content in the top zone. Caption (platform text field) is where bilingual text lives. ' +

    /* ── BILINGUAL POSTS (4.7.3) ──────────────────────────────── */
    'BILINGUAL POSTS — three approaches in order of preference: ' +
    '(1) VIDEO-FIRST (preferred): animation switches between English and Arabic quadrant layouts. ' +
    '(2) FALLBACK CAPTION: one language in the design, both in the platform caption. ' +
    '(3) FALLBACK DUAL LANGUAGE: only when title is very short — both languages on screen simultaneously. ' +
    'VIOLATION: dual language layout used when post content is too information-dense to fit both. ' +

    /* ── CO-BRANDING ARCHITECTURE (4.7.4) ────────────────────── */
    'CO-BRANDING — three architecture types: ' +
    'BSF & PARTNER: BSF leads; BSF logo fixed left corner (English) or right corner (Arabic); partner logos next to BSF or stacked at opposite corner; third-party imagery must align with BSF art direction. ' +
    'BSF COLLABORATION: when third-party imagery does not meet BSF photography principles, use a quadrant to separate BSF content from partner image. Do not place BSF logo directly on top of non-compliant imagery. ' +
    'PARTNER CAMPAIGN: partner brand leads visually; BSF logo must still be present and visible in the corner. ' +
    'T&Cs IN CO-BRANDING: three valid approaches — caption only, single baked-in line, or full text at 4XS. All three are valid. ' +

    /* ── WARNING MESSAGES (4.7.5) ────────────────────────────── */
    'WARNING MESSAGES — four valid formats only: ' +
    '(A) QUADRANT: 50/50 or full-bleed with a device mockup for context. ' +
    '(B) STRAPLINE: horizontal banner exclusively for warnings; icon inside must be 20px wide. Never for CTAs or non-warning content. ' +
    '(C) TYPOGRAPHY & ICON: large icon 80px wide + headline; use when mockups unavailable. ' +
    '(D) OVERSIZED ICON: icon width at least 40% of layout short side; must include a contextual mockup. Never use oversized icon alone. ' +

    /* ── VIOLATIONS SUMMARY ──────────────────────────────────── */
    'VIOLATIONS TO FLAG: ' +
    'English text right-aligned on a social post; ' +
    'Quadrant ratio changed from its standard proportion; ' +
    'Essential photo subject obscured by a panel; ' +
    'Crests used inside a 1/4 quarter quadrant layout; ' +
    'BSF logo absent or not clearly visible on a co-branded post; ' +
    'Functional color panel (green/yellow/red) used as a brand background; ' +
    'Illustration used in a warning post or any negative/safety-association post; ' +
    'Strapline used for a CTA or non-warning content; ' +
    'Oversized icon used without a contextual mockup; ' +
    'Dual language layout when content is too dense for both languages; ' +
    'Key headline placed in the non-visible top zone of an Instagram portrait post.'

/* ── analyze button ──────────────────────────────────────── */
analyzeBtn.addEventListener('click', function () {

  if (!imageB64 || !keys.length) return;

/* ── TWO-PASS analysis ───────────────────────────────────── */
var STEP_LABELS = [
  'Analyzing the design against BSF rules'
];

function setStep(i) {
  document.querySelectorAll('.lstep').forEach(function (el, j) {
    el.className = 'lstep' + (j < i ? ' done' : j === i ? ' active' : '');
  });
}

function runAnalysis(keys) {
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = 'Analyzing...';

  var stepsHTML = STEP_LABELS.map(function (l, i) {
    return '<div class="lstep' + (i === 0 ? ' active' : '') + '" id="lstep' + i + '">' +
      '<div class="lstep-dot"></div>' + l + '</div>';
  }).join('');

  rightPanel.innerHTML =
    '<div class="loadwrap"><div class="spin"></div>' +
    '<div class="lsteps">' + stepsHTML + '</div></div>';

  /* PASS 1: Ask the model to DESCRIBE the design in detail */
  var describePrompt =
    'Look carefully at this design image and describe what you observe in detail. ' +
    'Cover every visual element you can see:\n' +
    '1. COLORS: List every distinct color you can see with approximate hex values. Note what each color is used for (background, text, logo, decorative elements).\n' +
    '2. TYPOGRAPHY: (a) FONT STYLE: does the font look like a clean geometric sans-serif (like Codec Pro/Poppins) or a serif, script, or decorative font? (b) WEIGHT: is any headline text in Bold weight or Regular weight? (c) STYLE: is any text italic? (d) LANGUAGE: what language is the text — English, Arabic, or both? (e) ALIGNMENT: English text — is it left-aligned, right-aligned, or centered? Arabic text — is it right-aligned (correct) or centered? (f) CAPITALIZATION: are any headlines or body paragraphs in ALL CAPS? (g) TEXT COLORS: what color is the headline text? What color is the body/subtitle text? Are different colors used for different text levels?\n' +
    '3. LOGO: (a) Is there a BSF logo present? (b) Does it have BOTH the hexagon crest symbol AND the BSF wordmark together, or just one of them? (c) What color is the logo — White, Deep Teal, or Mint? (d) What is the EXACT POSITION — top-left, top-right, bottom-left, bottom-right corner; or center-left (horizontal midpoint left edge); or center-right (horizontal midpoint right edge); or center of the entire layout; or floating with no clear edge alignment? (e) Does the logo appear too small to be legible? (f) Are there any other logos visible (partner logos, sub-brand logos like BSF Corporate/Private/Personal/Capital)?\n' +
    '4. LAYOUT: (a) MODE: How is the design structured — full-bleed photo edge to edge, a solid color panel covering roughly one corner quadrant (about 25%), or a 50/50 split between a solid panel and a photo? (b) PANEL: if a solid panel exists, what color is it and which corner or half does it occupy? (c) TEXT ANCHORING: inside the panel or text area, is the title anchored at the TOP and the subheading/URL anchored at the BOTTOM, or is text floating vertically centered or scattered? (d) WHITE SPACE: does the layout feel clean with generous breathing room, or crowded with many elements and long copy? (e) ASPECT: is the format standard, or extreme (very wide banner or very tall vertical)? If extreme, how much text is in it? (f) CREST GRAPHIC: is there a large decorative crest line-art graphic anywhere? Is it full-frame on a solid background, cropped at an edge of a 50/50 layout, or inside a small quarter panel? (g) IMAGERY SOURCE: does the photography look like BSF brand photography, or partner/third-party imagery (partner products, partner branding visible)? (h) LOGO SCALE: does the logo size look proportional to the format, or dramatically oversized/undersized?\n' +
    '5. PHOTOGRAPHY: Describe in detail — (a) LIGHTING TYPE: is there a clear light source direction? Are shadows visible, sharp or soft? Does it look like natural daylight, diffused natural light, harsh studio flash, flat fluorescent, or ring-light? For night scenes: is there a specific directional light or bright element pulling focus, or is the whole scene uniformly dark and flat with nothing to draw the eye? (b) SHADOW QUALITY: are shadows hard-edged and defined (hard light) or soft and diffused (soft light) or absent (flat/fluorescent)? (c) SUBJECT MATTER: what exactly is shown? Are there people? What are they doing — real candid activity or visibly posed? Are people actively positioned with good posture, or does anyone appear slouching, stiff, or disengaged? Does the background look like a real environment or a plain studio backdrop? Any banking cliches like coins, cash, handshakes, graphs, calculators, piggy banks? Is the environment Saudi/regional or generic Western? (d) COLOR GRADING: what is the dominant tone — warm, cool, neutral, muted, vivid? Does any warmth appear natural (desert sand, golden sunlight, regional light) or like an artificial post-processing filter? If multiple tones are present, is roughly half the frame neutral/muted? Is saturation high or low? Are blacks crushed or shadows clean? (e) COMPOSITION: what is the primary focal point? Is there quiet empty space or a busy frame? Are there any foreground or midground elements competing with and interfering with the main subject? Are there leading lines or interesting angles? (f) PRODUCT CONTEXT: if phones, cards, or devices appear, what is the background environment — muted and natural or vivid/saturated? Does it look like real-life photography or a composited render? If a render/mockup, what colour is the background?\n' +
    '6. FORMAT & SOCIAL CONTEXT: (a) What is the aspect ratio — square, portrait 5:4, landscape, or tall vertical story? (b) Does this appear to be a social media post? If so: is it a master brand post (BSF photography only, no partner logos), a co-branding/partnership post (partner logos or third-party imagery visible), or a warning/safety message post? (c) If co-branding: what logos are visible and how are they positioned relative to the BSF logo — is BSF in the left or right corner? Are partner logos next to BSF or at the opposite corner? Is the BSF logo placed directly on top of third-party imagery? (d) If a warning post: which layout type is used — quadrant with mockup, strapline banner strip, typography with icon, or oversized icon? (e) Is illustration used anywhere in this design? If so, what style — geometric, editorial, hand-drawn? (f) Is there T&C disclaimer text visible? Is it very small (correct) or same size as body copy (wrong)?\n\n' +
    'Be precise. Mention specific things you actually see. Do not guess at things not visible.\n\n' +
    'Also following colors were sampled directly from the image pixels using precise color clustering: ' + sampledHexes.join(', ') + '. ' +
    'BSF approved colors for reference: White #FFFFFF, Deep Teal #002A30, Concrete #CCD4D6, BSF Teal #0D6976, Mint #91DFDA, Light Mint #DEF6F4 (digital UI only). Deep Teal tints at various opacities are also valid. ' +
    'When checking colors match these sampled values against the approved list. A color is compliant if it is within 20 RGB units of an approved color. Only flag colors that are clearly far from ALL approved colors. ' +
    'If the design has a phone or device mockup, clearly note which colors are inside the screen vs outside. Colors inside a screen are app UI colors and must NOT be checked against brand guidelines.';

  /* SINGLE PASS: the model sees the IMAGE while it applies the rules and scores.
     This is the key to precise feedback — nothing is lost to an intermediate text summary. */
  var selectedRules = keys.map(function (k) {
    return '[' + TITLES[k].toUpperCase() + ']: ' + RULES[k];
  }).join('\n\n');

  var template = keys.map(function (k) {
    return '{"key":"' + k + '","status":"pass","score":95,' +
      '"positives":["what is correct"],"issues":[],"recommendations":[]}';
  }).join(',\n    ');

  var auditPrompt =
    'You are a BSF brand compliance auditor. Look CAREFULLY at the attached design image and judge it against the BSF brand rules below. Base every finding on what is ACTUALLY VISIBLE in the image — not on assumptions.\n\n' +
    'HOW TO LOOK — before scoring, examine the image for each of these so your findings are specific:\n' + describePrompt + '\n\n' +
    'BSF BRAND RULES:\n' + selectedRules + '\n\n' +
    'TASK: For each category listed, look at the relevant parts of the image and determine if there is a violation. Be concrete: every issue and positive must refer to something you can actually see in this specific image (e.g. name the element, its colour, its position). Do not write generic statements that could apply to any design.\n\n' +
    'STRICT RULES FOR THIS AUDIT:\n' +
    '- Only flag something as a violation if you can clearly SEE it violating a rule. If you cannot tell from the image, do not flag it.\n' +
    '- If you genuinely cannot see enough to judge a category, say so in that category rather than inventing an issue.\n' +
        '- COLORS: Tints of Deep Teal (5-90% opacity) are valid digital backgrounds. Light Mint #DEF6F4 is valid in digital UI. Functional greens/yellows/reds are valid inside infographic charts. Only flag colors that are clearly off-brand and used as major brand elements outside these contexts.\n' +
        '- LAYOUT Step 1: Identify the mode before judging. Full bleed = photo fills 100% of frame, text over photo is CORRECT. Quarters = one corner solid panel approx 25% of frame. Halves = 50/50 split. A Concrete or BSF Teal background covering the whole frame is a valid full-bleed, not a panel violation. Only quarter and halves PANELS must be White or Deep Teal.\n' +
        '- LAYOUT: BSF Mint or BSF Teal text colors on a photographic full-bleed image are a violation (contrast). But White or Deep Teal text on photos is correct.\n' +
        '- LAYOUT: A 1/4 quadrant panel obscuring the face or main subject of a photo is a violation. A 50/50 split that awkwardly crops the subject at a joint or body part is a violation.\n' +
        '- LAYOUT: Partnership or third-party photography in a FULL BLEED layout is a violation — partner imagery must sit in a quarters or halves layout. BSF brand photography full bleed is fine.\n' +
        '- LAYOUT: Generous white space and large empty areas are intentional and on-brand — NEVER flag them. Only flag the opposite: a crowded layout with no breathing room.\n' +
        '- LAYOUT: A large crest line-art graphic filling a solid-color full bleed, or a cropped crest decorating a 50/50 layout, is VALID. A crest placed inside a small 1/4 quarter panel is a violation.\n' +
        '- LAYOUT: Extreme formats (very wide banners, very tall verticals) must carry minimal text — flag long multi-line copy in these formats. Do not flag minimal text as missing content.\n' +
        '- LAYOUT: Inside a quarter or halves panel the title anchors top and the URL/subheading anchors bottom. Only flag anchoring if the description clearly says text is floating vertically centered or scattered. If anchoring is not mentioned, do not flag it.\n' +
        '- LAYOUT: Mint used on a CTA or URL inside a panel is a valid accent — do not flag. Mint used for a title or body copy is a violation.\n' +
        '- LAYOUT: A White panel on a design with no logo is at most a minor advisory (Deep Teal preferred for brand presence) — never score it as a hard violation.\n' +
        '- FOR ART DIRECTION: name the specific violation precisely. Do not write generic phrases. Natural soft and hard/dramatic light are both valid. A warm color tint is CORRECT per BSF grading spec — only flag heavy orange/amber Instagram filters. Naturally warm desert landscapes, golden sand, and golden-hour scenes are valid single-tone examples — never flag these as over-warm.\n' +
        '- NIGHT SHOTS: darkness alone is not a violation. Flag only scenes where there is no directional light source and nothing pulling focus — flat and dark together is the problem, not dark alone.\n' +
        '- MULTIPLE-TONE GRADING: vivid environmental colors (blue sky, green plants, red/pink flowers) in a scene are valid as long as roughly 50% of the frame is in neutral/muted tones. Do NOT flag multi-tone images as over-saturated when vivid colors come from natural scene elements within a muted-dominant composition.\n' +
        '- CORPORATE HEADSHOTS: blurred real-world architectural or office backgrounds are valid — only flag plain white or solid-color studio backdrops with zero real-world context.\n' +
        '- PRODUCT RENDERS/MOCKUPS: background must be BSF Concrete or BSF Deep Teal. Any other background color on a render/mockup is a violation.\n' +
        '- Quiet space in composition is intentional — never flag it.\n' +
        '- TYPOGRAPHY COLOUR RULE: On a BSF Teal (#0D6976) background, White is the ONLY valid text color. If the description says any non-White text appears on a BSF Teal background, that is a violation. Deep Teal text on BSF Teal is explicitly wrong — flag it. On a BSF Concrete (#CCD4D6) background, BSF Deep Teal is the ONLY valid text color — BSF Teal or any other color as text on Concrete is a violation. On Mint background, only Deep Teal is valid. On White background, Deep Teal is the primary text color; BSF Teal is only valid as a subtitle or link color, never as headline/title.\n' +
        '- SOCIAL ILLUSTRATION RULE: illustration is ONLY valid in Partnerships & Promotions posts. If the description identifies illustration in a warning, safety, or master brand post, flag it as a violation.\n' +
        '- SOCIAL CO-BRANDING: the BSF logo must always be visible. For English posts it goes in the left corner; Arabic posts, right corner. If the description says the BSF logo is missing or placed on top of third-party imagery, flag it.\n' +
        '- SOCIAL WARNING MESSAGES: only four formats are valid (quadrant, strapline, typography+icon, oversized icon). An oversized icon without a supporting mockup is a violation. A strapline used for a CTA or promotional content is a violation.\n' +
        '- A wide Arabic headline that spans most of the layout width is right-aligned, not centered. Never flag Arabic text as centered.\n' +
        '- To confirm centering: centered text has equal space on both left and right sides. Right-aligned text has its right edge flush to the margin with a ragged left edge. If in doubt, do not flag it.\n' +
        '- Colors inside a phone screen or app UI mockup are NOT brand colors. Never flag them.\n' +
        '- A white background that looks slightly warm due to photo lighting or compression is still White. Do not flag it unless it is clearly a different color like cream or tan.\n' +
        '- A white or Deep Teal solid background panel beside a photograph is ALWAYS a valid BSF layout. Never flag it.\n' +
        '- In full-bleed layouts the photograph covers 100% of the frame and text sits directly over the photo. This is CORRECT. Only flag it if the text sits over a visually busy complex area of the photo making it unreadable.\n' +
        '- Score 90-100: fully compliant. Score 75-89: one minor issue. Score 55-74: one clear violation. Score 35-54: multiple violations. Score below 35: fundamental failures.\n' +
        '- status must be "pass" if score is 75 or above, "warn" if 55-74, "fail" if below 55.\n' +
        '- Write all string values in plain English, no apostrophes, no special characters, max 80 characters per string.\n' +
        '- Max 3 items per array.\n\n' +
        'Return ONLY this JSON, nothing before or after:\n' +
        '{\n  "results": [\n    ' + template + '\n  ]\n}';

  callAPI(auditPrompt, 2000, 1)
    .then(function (raw) {
      setStep(1);

      if (!results.length) {
        rightPanel.innerHTML =
          '<div class="cmsg"><div class="ico">&#9888;</div><h2>Could not read the audit</h2>' +

      analyzeBtn.disabled = false;
      analyzeBtn.textContent = 'Analyze Again';
    });

/* ── API call — returns raw text ─────────────────────────── */
function callAPI(prompt, maxTokens, attempt) {
  var body = {
    model: 'claude-opus-4-8',
    max_tokens: maxTokens,
    system: 'You are a precise BSF brand auditor. Judge only what is actually visible in the attached image. Output only a raw JSON object — no markdown fences, no text before or after the braces. Use plain ASCII only in all string values.',
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageB64 } },
        { type: 'text',  text: prompt }
      ]
    }]
  };

  return fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-access-password': (window.BSF_PW || '') },
    body: JSON.stringify(body)
  })
  .then(function (res) {
    if (!res.ok) {
      return res.text().then(function (t) {
        /* 401 = wrong/missing access password — forget it so the user is asked again */
        if (res.status === 401) {
          window.BSF_PW = '';
          throw new Error('Access password was wrong. Click Analyze to try again.');
        }
        /* 429 = rate limit */
        if (res.status === 429 && attempt <= 4) {
          var waitMs = 10000;
          try {
            var errObj = JSON.parse(t);
            var inner  = JSON.parse(errObj.error.message);
            if (inner.resetsAt) {
              var ms = inner.resetsAt * 1000 - Date.now();
              if (ms > 0 && ms < 120000) waitMs = ms + 1000;
            }
          } catch (e) {}
          showRateMsg(waitMs, attempt);
          return wait(waitMs).then(function () { return callAPI(prompt, maxTokens, attempt + 1); });
        }
        if (res.status === 429) {
          throw new Error('Rate limit reached. Please wait a few minutes and try again.');
        }
        /* 529 = overloaded */
        if (res.status === 529 && attempt <= 3) {
          return wait(3000).then(function () { return callAPI(prompt, maxTokens, attempt + 1); });
        }
        throw new Error('API error ' + res.status + ': ' + t.substring(0, 200));
      });
    }
    return res.json();
  })
  .then(function (d) {
    if (d && d.error) throw new Error(d.error.type + ': ' + d.error.message);
    var text = '';
    if (d && d.content) {
      for (var i = 0; i < d.content.length; i++) {
        if (d.content[i].type === 'text') { text = d.content[i].text; break; }
      }
    }
    return text;
  });
}

function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

function showRateMsg(waitMs, attempt) {
  var secs = Math.ceil(waitMs / 1000);
  var wrap = document.querySelector('.loadwrap');
  if (!wrap) return;
  var existing = document.getElementById('ratemsg');
  if (existing) existing.parentNode.removeChild(existing);
  var div = document.createElement('div');
  div.id = 'ratemsg';
  div.style.cssText = 'margin-top:12px;padding:9px 14px;background:#FFF7E0;border:1px solid #FFD966;border-radius:7px;font-size:12px;color:#7A5C00;text-align:center;max-width:260px';
  div.innerHTML = '&#9203; Rate limit hit &mdash; retrying in <strong>' + secs + 's</strong> (attempt ' + attempt + '/4)';
  wrap.appendChild(div);
  var remaining = secs;
  var timer = setInterval(function () {
    remaining--;
    var el = document.getElementById('ratemsg');
    if (!el) { clearInterval(timer); return; }
    if (remaining <= 0) { clearInterval(timer); return; }
    el.innerHTML = '&#9203; Rate limit hit &mdash; retrying in <strong>' + remaining + 's</strong> (attempt ' + attempt + '/4)';
  }, 1000);
}

/* ── JSON parser ─────────────────────────────────────────── */
function safeParseJSON(raw) {
  if (!raw) return {};
  var s = raw.replace(/```[\s\S]*?```/g, '').replace(/`/g, '').trim();
  var si = s.indexOf('{'), ei = s.lastIndexOf('}');
  if (si === -1 || ei <= si) return {};
  s = s.substring(si, ei + 1);
  try { return JSON.parse(s); } catch (e) { /* continue */ }
  s = s.replace(/,(\s*[}\]])/g, '$1');
  try { return JSON.parse(s); } catch (e) { /* continue */ }
  /* repair */
  var out = '', inStr = false, ob = 0, ob2 = 0;
  for (var i = 0; i < s.length; i++) {
    var c = s[i], p = i > 0 ? s[i-1] : '';
    if (c === '"' && p !== '\\') inStr = !inStr;
    if (!inStr) {
      if (c === '{') ob++; else if (c === '}') ob--;
      else if (c === '[') ob2++; else if (c === ']') ob2--;
    }
    out += c;
  }
  if (inStr) out += '"';
  out = out.replace(/,(\s*[}\]])/g, '$1');
  while (ob2 > 0) { out += ']'; ob2--; }
  while (ob  > 0) { out += '}'; ob--;  }
  try { return JSON.parse(out); } catch (e) {
    console.error('Parse failed:', e.message, raw.substring(0, 200));
    return {};
  }
}

/* ── render ──────────────────────────────────────────────── */
var SP = {pass:'pp',warn:'pw',fail:'pf'};
var SB = {pass:'sp',warn:'sw2',fail:'sf'};
var SD = {pass:'dsp',warn:'dsw',fail:'dsf'};
var SI = {pass:'&#10003;',warn:'!',fail:'&#10005;'};
var ST = {pass:'Pass',warn:'Review',fail:'Fail'};

function renderResults(checks) {
  if (!checks.length) {
    rightPanel.innerHTML = '<div class="cmsg"><h2>No results returned. Try again.</h2></div>';
    return;
  }
  var scores = checks.map(function (c) { return typeof c.score === 'number' ? c.score : 70; });
  var avg   = Math.round(scores.reduce(function (a,b){return a+b;},0) / scores.length);
  var rc    = avg>=80?'rp':avg>=60?'rw':'rf';
  var label = avg>=88?'On Brand':avg>=75?'Mostly On Brand':avg>=55?'Needs Improvement':'Off Brand';
  var col   = avg>=80?'#6AD495':avg>=60?'#FFE86D':'#F57D84';

  var html =
    '<div class="srow">' +
      '<div class="sring '+rc+'"><span class="sn">'+avg+'</span><span class="ss">/100</span></div>' +
      '<div class="smeta"><div class="sv">'+label+'</div>' +
      '<div class="btrack"><div class="bfill" id="bfill" style="width:0;background:'+col+'"></div></div></div>' +
    '</div><div class="cgrid">';

  checks.forEach(function (c, i) {
    var k = c.key||'';
    html +=
      '<div class="cc '+(SB[c.status]||'sp')+(i===0?' active':'')+'" data-key="'+k+'">' +
        '<div class="ctop"><span class="cico">'+(ICONS[k]||'')+'</span>' +
        '<span class="cpill '+(SP[c.status]||'pp')+'">'+(ST[c.status]||'Pass')+'</span></div>' +
        '<div class="cn">'+(TITLES[k]||k)+'</div>' +
        '<div class="cs">'+(c.score||0)+'/100</div>' +
      '</div>';
  });
  html += '</div>';

  checks.forEach(function (c, i) {
    var k   = c.key||'';
    var pos = flt(c.positives);
    var iss = flt(c.issues);
    var rec = flt(c.recommendations);
    html +=
      '<div class="det'+(i===0?' vis':'')+'" id="det-'+k+'">' +
        '<div class="dhead">' +
          '<div class="dst '+(SD[c.status]||'dsp')+'">'+(SI[c.status]||'?')+'</div>' +
          '<div class="dtitle">'+(TITLES[k]||k)+'</div>' +
          '<div class="dsc">'+(c.score||0)+'/100</div>' +
        '</div><div class="frows">';

    if (pos.length) {
      html += '<div><div class="flbl flp">Compliant</div><div class="flist">';
      pos.forEach(function(p){html+='<div class="fitem"><div class="fdot fdp"></div><span>'+esc(p)+'</span></div>';});
      html += '</div></div>';
    }
    if (iss.length) {
      html += '<div><div class="flbl fli">Violations</div><div class="flist">';
      iss.forEach(function(p){html+='<div class="fitem"><div class="fdot fdi"></div><span>'+esc(p)+'</span></div>';});
      html += '</div></div>';
    }
    if (rec.length) {
      html += '<div><div class="flbl flr">Fix</div><div class="flist">';
      rec.forEach(function(p){html+='<div class="fitem"><div class="fdot fdr"></div><span>'+esc(p)+'</span></div>';});
      html += '</div></div>';
    }
    if (!pos.length && !iss.length) {
      html += '<div class="fna">No specific observations.</div>';
    }
    html += '</div></div>';
  });

  rightPanel.innerHTML = html;
  requestAnimationFrame(function () {
    var bf = document.getElementById('bfill');
    if (bf) bf.style.width = avg + '%';
  });
  document.querySelectorAll('.cc').forEach(function (card) {
    card.addEventListener('click', function () {
      document.querySelectorAll('.cc').forEach(function(c){c.classList.remove('active');});
      document.querySelectorAll('.det').forEach(function(d){d.classList.remove('vis');});
      card.classList.add('active');
      var det = document.getElementById('det-' + card.getAttribute('data-key'));
      if (det) det.classList.add('vis');
    });
  });
}

function flt(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.filter(function(x){return typeof x==='string'&&x.trim().length>3;});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

}());
</script>
</body>
</html>
